name: Build

on:
   push:
      branches:
      - master
   pull_request:
      branches:
      - master

env:
   MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
   MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
   MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
   deploy:
      runs-on: ubuntu-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: ~/.m2/repository
            key: maven-${{ hashFiles('pom.xml') }}

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            java-version: 17
            distribution: temurin
            mvn-toolchain-id: |
               JavaSE-17

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
         run: |-
            mvn clean deploy sonar:sonar -U -B -P "sign,sonar" \
               -Dsonar.host.url=https://sonarcloud.io \
               -Dsonar.organization=b3dgs \
               -Dsonar.token=$SONAR_TOKEN \
               -Dsonar.projectKey=b3dgs_b3dgs-parent