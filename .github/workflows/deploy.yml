# This workflow will:
# - compile and sign project on linux with JDK 17
# - run sonar on linux
# - deploy snapshot on maven

name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      JDK_VERSION: 17

    steps:
     - name: Checkout
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
       with:
         fetch-depth: 0

     - name: Cache
       uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
       with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}

     - name: Maven
       uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0
       with:
         maven-version: 3.9.14

     - name: Set JDK
       uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
       with:
         java-version: |
           17
         distribution: 'temurin'
         mvn-toolchain-id: |
           JavaSE-17
         server-id: ossrh
         server-username: MAVEN_USERNAME
         server-password: MAVEN_PASSWORD

     - name: Import GPG key
       uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
       with:
         gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
         passphrase: ${{ secrets.GPG_PASSPHRASE }}

     - name: Compile
       run: mvn clean deploy -U -Psign
       env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  sonar:
    runs-on: ubuntu-latest
    env:
      JDK_VERSION: 17

    steps:
     - name: Checkout
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
       with:
         fetch-depth: 0

     - name: Cache
       uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
       with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}

     - name: Maven
       uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0
       with:
         maven-version: 3.9.14

     - name: Set JDK
       uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
       with:
         java-version: |
           17
         distribution: 'temurin'
         mvn-toolchain-id: |
           JavaSE-17

     - name: Compile
       run: mvn clean org.sonarsource.scanner.maven:sonar-maven-plugin:sonar verify -U -Dsonar.organization=b3dgs -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=b3dgs_b3dgs-parent
       env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
